name: idp

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: idp
    ports:
      # Host port 5433 to avoid clashing with a natively installed Postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp -d idp"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  pgdata:
