name: idp

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: idp
    ports:
      # Host port 5433 to avoid clashing with a natively installed Postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp -d idp"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://idp:idp@postgres:5432/idp?sslmode=disable
      APP_SEED: "true"
    volumes:
      - ./backend:/app
      - gomodcache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    # Webpack dev server here, not Turbopack: only webpack's watcher honors
    # WATCHPACK_POLLING, which bind mounts on Windows/macOS require
    command: ["pnpm", "exec", "next", "dev"]
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
  gomodcache:
