root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/api ./cmd/api"
bin = "./tmp/api"
include_ext = ["go", "sql", "yaml"]
exclude_dir = ["tmp"]
# Windows/macOS bind mounts don't deliver inotify events to the container;
# polling is the only reliable change detection under docker-compose.
poll = true
poll_interval = 500

[log]
time = true
